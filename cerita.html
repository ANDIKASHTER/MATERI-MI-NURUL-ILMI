<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cerita Inspiratif Puasa – MI Nurul Ilmi</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --neon: #39ff14;
      --neon-glow: rgba(57, 255, 20, 0.6);
      --neon-dim: rgba(57, 255, 20, 0.2);
      --glass-bg: rgba(0, 0, 0, 0.45);
      --glass-border: rgba(57, 255, 20, 0.35);
      --text-main: #f0fff0;
      --text-sub: rgba(220, 255, 220, 0.8);
      --card-bg: rgba(10, 30, 10, 0.55);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      color: var(--text-main);
      overflow-x: hidden;
      background:
        linear-gradient(rgba(0,0,0,0.62), rgba(0,0,0,0.62)),
        url('https://png.pngtree.com/thumb_back/fw800/background/20240124/pngtree-happy-iftar-ramadan-illustration-design-image_15571407.png')
        center/cover fixed no-repeat;
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 10px 20px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(14px);
      border-bottom-left-radius: 18px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 0 18px var(--neon-dim);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
    }

    .header-brand img {
      height: 38px;
      width: 38px;
      object-fit: contain;
      border-radius: 50%;
      border: 1.5px solid var(--neon);
      box-shadow: 0 0 8px var(--neon-glow);
    }

    .header-brand span {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--neon);
      text-shadow: 0 0 8px var(--neon-glow);
      line-height: 1.2;
      white-space: nowrap;
    }

    .header-divider {
      width: 1px;
      height: 36px;
      background: var(--glass-border);
    }

    /* ── MAIN WRAPPER ── */
    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 110px 20px 60px;
    }

    /* ── PAGE TITLE ── */
    .page-title {
      text-align: center;
      margin-bottom: 36px;
      animation: fadeIn 0.9s ease 0.1s both;
    }

    .page-title h1 {
      font-family: 'Amiri', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      color: var(--neon);
      text-shadow: 0 0 18px var(--neon-glow), 0 0 36px var(--neon-dim);
      letter-spacing: 1px;
    }

    .page-title p {
      margin-top: 8px;
      font-size: 0.92rem;
      color: var(--text-sub);
      font-weight: 300;
    }

    /* ── CARD BASE ── */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(18px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      box-shadow: 0 0 24px var(--neon-dim), inset 0 0 20px rgba(57,255,20,0.04);
      padding: 28px;
      margin-bottom: 28px;
      animation: fadeIn 0.8s ease both;
    }

    /* ── VIDEO ── */
    .video-card {
      animation-delay: 0.2s;
    }

    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 14px;
      border: 2px solid var(--glass-border);
      box-shadow: 0 0 28px var(--neon-glow), 0 0 60px var(--neon-dim);
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      border-radius: 12px;
    }

    /* ── QUESTIONS ── */
    .questions-card {
      animation-delay: 0.35s;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--neon);
      text-shadow: 0 0 10px var(--neon-glow);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-title::before {
      content: '';
      display: inline-block;
      width: 4px; height: 20px;
      background: var(--neon);
      border-radius: 4px;
      box-shadow: 0 0 8px var(--neon-glow);
    }

    .question-item {
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(57,255,20,0.2);
      border-radius: 14px;
      padding: 14px 18px;
      margin-bottom: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    .question-item:hover {
      border-color: var(--neon);
      box-shadow: 0 0 16px var(--neon-dim);
      transform: translateY(-2px);
    }

    .question-item.active {
      border-color: var(--neon);
      box-shadow: 0 0 20px var(--neon-dim);
    }

    .question-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .question-num {
      background: var(--neon);
      color: #000;
      font-weight: 700;
      font-size: 0.78rem;
      width: 26px; height: 26px;
      min-width: 26px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 10px var(--neon-glow);
      margin-top: 1px;
    }

    .question-text {
      font-size: 0.93rem;
      color: var(--text-main);
      line-height: 1.6;
      flex: 1;
    }

    .question-toggle {
      margin-left: auto;
      color: var(--neon);
      font-size: 1.1rem;
      transition: transform 0.3s ease;
      min-width: 18px;
      text-align: center;
    }

    .question-item.active .question-toggle {
      transform: rotate(45deg);
    }

    .answer-box {
      display: none;
      margin-top: 14px;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .answer-box.open {
      display: block;
    }

    .answer-box textarea {
      width: 100%;
      min-height: 90px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(57,255,20,0.35);
      background: rgba(0,0,0,0.5);
      color: var(--text-main);
      font-family: 'Poppins', sans-serif;
      font-size: 0.88rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.25s;
    }

    .answer-box textarea:focus {
      border-color: var(--neon);
      box-shadow: 0 0 12px var(--neon-dim);
    }

    .answer-box textarea::placeholder {
      color: rgba(180,255,180,0.35);
    }

    .answer-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
    }

    .btn-save {
      padding: 8px 20px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.83rem;
      font-weight: 600;
      color: #000;
      background: var(--neon);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 0 14px var(--neon-glow);
      transition: all 0.25s ease;
    }

    .btn-save:hover {
      background: #fff;
      box-shadow: 0 0 22px var(--neon-glow);
      transform: scale(1.04);
    }

    .save-msg {
      font-size: 0.8rem;
      color: var(--neon);
      opacity: 0;
      transition: opacity 0.4s;
      text-shadow: 0 0 6px var(--neon-glow);
    }

    .save-msg.show { opacity: 1; }

    /* ── SAVED INDICATOR ── */
    .saved-badge {
      position: absolute;
      top: 10px; right: 44px;
      font-size: 0.68rem;
      background: rgba(57,255,20,0.18);
      color: var(--neon);
      border: 1px solid var(--neon);
      border-radius: 20px;
      padding: 2px 9px;
      display: none;
    }

    .question-item.has-answer .saved-badge { display: inline-block; }

    /* ── NAV BUTTON ── */
    .nav-section {
      text-align: center;
      margin-top: 10px;
      animation: fadeIn 0.8s ease 0.5s both;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 12px 32px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--neon);
      background: rgba(0,0,0,0.5);
      border: 2px solid var(--neon);
      border-radius: 40px;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 0 18px var(--neon-dim), inset 0 0 12px rgba(57,255,20,0.05);
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }

    .btn-back:hover {
      background: var(--neon);
      color: #000;
      box-shadow: 0 0 32px var(--neon-glow), 0 0 60px var(--neon-dim);
      transform: translateY(-3px) scale(1.03);
    }

    .btn-back svg {
      transition: transform 0.3s ease;
    }

    .btn-back:hover svg { transform: translateX(-4px); }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.72rem;
      color: rgba(180,255,180,0.3);
      letter-spacing: 0.5px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      main { padding: 100px 14px 50px; }
      .card { padding: 18px; }
      header { padding: 8px 14px; gap: 12px; }
      .header-brand img { height: 30px; width: 30px; }
      .header-brand span { font-size: 0.65rem; }
      .card-title { font-size: 0.97rem; }
    }
  </style>
</head>
<body>

  <!-- ── HEADER ── -->
  <header>
    <div class="header-brand">
      <img src="https://tse2.mm.bing.net/th/id/OIP.V800Wvfl-PrG6jZrhcKrLgHaHF?pid=Api&P=0&h=180" alt="Logo MI Nurul Ilmi" onerror="this.style.display='none'"/>
      <span>MI NURUL<br>ILMI</span>
    </div>
    <div class="header-divider"></div>
    <div class="header-brand">
      <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhKrfuU49wIAhZYKt06jMJ6vSIlXf1sXX9iY0GQvJLNJvx59xj7Uxu_7s8zzxBusFVveAOdwx2EnqGba3TF6TuKbeqLvSlM84vVkONV0O4-7YTMaf9BZDfB8dZ-HFO4sREQLqVaYc5UQ_pt0LFNT6cUHzvtIClVoDa66F6bIJoPxox-w4xDcR3zLt0KrOWH/s3724/LOGO%20UIN%20SUNAN%20KUDUS.jpg" alt="Logo UIN Sunan Kudus" onerror="this.style.display='none'"/>
      <span>UIN SUNAN<br>KUDUS</span>
    </div>
  </header>

  <!-- ── MAIN ── -->
  <main>

    <!-- TITLE -->
    <div class="page-title">
      <h1>✨ Cerita Inspiratif Puasa</h1>
      <p>Simak video berikut dan renungkan maknanya</p>
    </div>

    <!-- VIDEO -->
    <div class="card video-card">
      <div class="video-wrapper">
        <iframe
          src="https://www.youtube.com/embed/W1LziAQXAYU?si=6YaFyMs1DnQXFlPZ"
          title="Cerita Inspiratif Puasa"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen>
        </iframe>
      </div>
    </div>

    <!-- QUESTIONS -->
    <div class="card questions-card">
      <div class="card-title">Pertanyaan Pemantik</div>

      <div id="questions-list"></div>
    </div>

    <!-- NAVIGATION -->
    <div class="nav-section">
      <a href="fiqih.html" class="btn-back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        Kembali ke Beranda
      </a>
    </div>

  </main>

  <footer>© MI Nurul Ilmi × UIN Sunan Kudus — Media Pembelajaran Fiqih</footer>

  <script>
    const questions = [
      "Apakah menonton iklan sirup membatalkan puasa?",
      "Di Indonesia kita berpuasa selama berapa jam?",
      "Apakah puasa setengah hari sah?",
      "Karena Rara tidak mau kalah dari kakaknya, ia ingin puasa sampai isya. Padahal puasa dimulai dari …… sampai ……",
      "Jika ingin mendapatkan pahala berlipat ganda, puasa kita harus apa?"
    ];

    const STORAGE_KEY = 'cerita_inspiratif_answers';

    function loadAnswers() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      } catch { return {}; }
    }

    function saveAnswer(idx, text) {
      const data = loadAnswers();
      data[idx] = text;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function buildQuestions() {
      const saved = loadAnswers();
      const container = document.getElementById('questions-list');

      questions.forEach((q, i) => {
        const hasSaved = saved[i] && saved[i].trim() !== '';

        const item = document.createElement('div');
        item.className = 'question-item' + (hasSaved ? ' has-answer' : '');
        item.dataset.idx = i;

        item.innerHTML = `
          <span class="saved-badge">✓ Tersimpan</span>
          <div class="question-header">
            <span class="question-num">${i + 1}</span>
            <span class="question-text">${q}</span>
            <span class="question-toggle">+</span>
          </div>
          <div class="answer-box" id="ans-box-${i}">
            <textarea
              id="ans-${i}"
              placeholder="Tulis jawabanmu di sini…"
              rows="3"
            >${hasSaved ? saved[i] : ''}</textarea>
            <div class="answer-actions">
              <button class="btn-save" onclick="handleSave(${i}, event)">💾 Simpan Jawaban</button>
              <span class="save-msg" id="msg-${i}">✅ Jawaban berhasil disimpan!</span>
            </div>
          </div>
        `;

        // Toggle open/close
        item.querySelector('.question-header').addEventListener('click', () => toggleQuestion(item, i));

        container.appendChild(item);
      });
    }

    function toggleQuestion(item, idx) {
      const box = document.getElementById(`ans-box-${idx}`);
      const isOpen = item.classList.contains('active');

      // Close all first
      document.querySelectorAll('.question-item').forEach(el => {
        el.classList.remove('active');
        el.querySelector('.answer-box').classList.remove('open');
      });

      if (!isOpen) {
        item.classList.add('active');
        box.classList.add('open');
        setTimeout(() => box.querySelector('textarea').focus(), 150);
      }
    }

    function handleSave(idx, e) {
      e.stopPropagation();
      const ta = document.getElementById(`ans-${idx}`);
      const msg = document.getElementById(`msg-${idx}`);
      const item = document.querySelector(`.question-item[data-idx="${idx}"]`);

      saveAnswer(idx, ta.value);

      item.classList.add('has-answer');
      msg.classList.add('show');
      setTimeout(() => msg.classList.remove('show'), 2500);
    }

    buildQuestions();
  </script>
</body>
</html>
