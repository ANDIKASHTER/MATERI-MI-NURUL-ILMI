 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mari Belajar Bersama - MI Nurul Ilmi</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&amp;family=Poppins:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    :root {
      --neon: #39ff14;
      --neon-dim: #1a8a0a;
      --bg-dark: #0a0a0f;
      --bg-card: #111118;
      --surface: #1a1a24;
      --text-main: #e0e0e0;
    }

    html, body { height: 100%; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg-dark);
      color: var(--text-main);
      overflow-x: hidden;
    }

    .font-orbitron { font-family: 'Orbitron', monospace; }

    /* Laser lines background */
    .laser-bg {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .laser-line {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--neon), transparent);
      opacity: 0.15;
      animation: laserMove linear infinite;
    }

    .laser-line:nth-child(1) { top: 10%; width: 80%; left: -20%; animation-duration: 8s; }
    .laser-line:nth-child(2) { top: 25%; width: 60%; left: 10%; animation-duration: 12s; animation-delay: 2s; }
    .laser-line:nth-child(3) { top: 45%; width: 90%; left: -30%; animation-duration: 10s; animation-delay: 4s; }
    .laser-line:nth-child(4) { top: 65%; width: 70%; left: 5%; animation-duration: 14s; animation-delay: 1s; }
    .laser-line:nth-child(5) { top: 80%; width: 50%; left: 20%; animation-duration: 9s; animation-delay: 3s; }
    .laser-line:nth-child(6) { top: 92%; width: 85%; left: -10%; animation-duration: 11s; animation-delay: 5s; }

    .laser-v {
      position: absolute;
      width: 1px;
      background: linear-gradient(180deg, transparent, var(--neon), transparent);
      opacity: 0.08;
      animation: laserMoveV linear infinite;
    }
    .laser-v:nth-child(7) { left: 15%; height: 60%; top: -20%; animation-duration: 13s; }
    .laser-v:nth-child(8) { left: 50%; height: 70%; top: -30%; animation-duration: 16s; animation-delay: 3s; }
    .laser-v:nth-child(9) { left: 80%; height: 50%; top: -10%; animation-duration: 11s; animation-delay: 6s; }

    @keyframes laserMove {
      0% { transform: translateX(-100%); opacity: 0; }
      10% { opacity: 0.15; }
      90% { opacity: 0.15; }
      100% { transform: translateX(200%); opacity: 0; }
    }
    @keyframes laserMoveV {
      0% { transform: translateY(-100%); opacity: 0; }
      10% { opacity: 0.08; }
      90% { opacity: 0.08; }
      100% { transform: translateY(200%); opacity: 0; }
    }

    /* Particles */
    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--neon);
      border-radius: 50%;
      opacity: 0;
      animation: particleFloat linear infinite;
    }
    @keyframes particleFloat {
      0% { opacity: 0; transform: translateY(0) scale(0); }
      20% { opacity: 0.6; transform: scale(1); }
      80% { opacity: 0.3; }
      100% { opacity: 0; transform: translateY(-200px) scale(0); }
    }

    /* Neon glow text */
    .neon-glow {
      text-shadow:
        0 0 10px var(--neon),
        0 0 30px var(--neon),
        0 0 60px rgba(57, 255, 20, 0.3);
    }

    .neon-glow-subtle {
      text-shadow:
        0 0 8px rgba(57, 255, 20, 0.5),
        0 0 20px rgba(57, 255, 20, 0.2);
    }

    /* Neon button */
    .neon-btn {
      position: relative;
      border: 2px solid var(--neon);
      background: transparent;
      color: var(--neon);
      padding: 14px 36px;
      border-radius: 12px;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      overflow: hidden;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .neon-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--neon);
      opacity: 0;
      transition: opacity 0.3s;
      border-radius: 10px;
    }
    .neon-btn:hover::before { opacity: 0.12; }
    .neon-btn:hover {
      box-shadow: 0 0 20px rgba(57, 255, 20, 0.4), 0 0 40px rgba(57, 255, 20, 0.15);
      transform: scale(1.05);
    }
    .neon-btn:active { transform: scale(0.95); }
    .neon-btn span { position: relative; z-index: 1; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      padding: 20px;
    }
    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }
    .modal-box {
      background: var(--bg-card);
      border: 1px solid rgba(57, 255, 20, 0.25);
      border-radius: 20px;
      padding: 32px;
      max-width: 480px;
      width: 100%;
      transform: scale(0.85);
      transition: transform 0.3s ease;
      box-shadow: 0 0 40px rgba(57, 255, 20, 0.08);
      max-height: 85%;
      overflow-y: auto;
    }
    .modal-overlay.active .modal-box { transform: scale(1); }

    .modal-close {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(57, 255, 20, 0.3);
      background: transparent;
      color: var(--neon);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .modal-close:hover {
      background: rgba(57, 255, 20, 0.15);
      box-shadow: 0 0 12px rgba(57, 255, 20, 0.3);
    }

    /* Person button in modal */
    .person-btn {
      width: 100%;
      padding: 16px 20px;
      background: var(--surface);
      border: 1px solid rgba(57, 255, 20, 0.15);
      border-radius: 12px;
      color: var(--text-main);
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .person-btn:hover {
      border-color: var(--neon);
      background: rgba(57, 255, 20, 0.06);
      box-shadow: 0 0 15px rgba(57, 255, 20, 0.12);
      transform: translateX(6px);
    }
    .person-btn:active { transform: scale(0.97); }

    /* Class grid button */
    .class-btn {
      padding: 20px;
      background: var(--surface);
      border: 1px solid rgba(57, 255, 20, 0.15);
      border-radius: 14px;
      color: var(--neon);
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 1.05rem;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
    }
    .class-btn:hover {
      border-color: var(--neon);
      background: rgba(57, 255, 20, 0.08);
      box-shadow: 0 0 20px rgba(57, 255, 20, 0.2);
      transform: translateY(-4px);
    }
    .class-btn:active { transform: scale(0.94); }

    /* Detail card */
    .detail-row {
      display: flex;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(57, 255, 20, 0.07);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label {
      color: var(--neon);
      font-weight: 600;
      min-width: 80px;
      font-size: 0.9rem;
    }
    .detail-value {
      color: var(--text-main);
      font-size: 0.9rem;
    }

    /* Logo hover */
    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: default;
      transition: all 0.3s;
    }
    .logo-wrap:hover {
      filter: drop-shadow(0 0 8px rgba(57, 255, 20, 0.5));
      transform: scale(1.04);
    }
    .logo-wrap img {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(57, 255, 20, 0.3);
    }

    /* Fade in animation */
    .fade-up {
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 0.8s ease forwards;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-delay-1 { animation-delay: 0.2s; }
    .fade-delay-2 { animation-delay: 0.4s; }
    .fade-delay-3 { animation-delay: 0.6s; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: var(--neon-dim); border-radius: 3px; }
  </style>

  <script>
    // Person data
    const people = {
      andika: {
        name: 'Mas Andika',
        details: [
          ['Nama', 'Andika Bayu Saputra'],
          ['Alamat', 'Bategede Nalumsari Jepara'],
          ['Riwayat', 'MI Nurul Ilmi, MTs NU TBS Kudus, MA NU TBS Kudus'],
          ['Hobi', 'Mencari pengetahuan baru']
        ]
      },
      dai: {
        name: 'Mas Dai',
        details: [
          ['Nama', 'Achmad Dai Awalludin Syah'],
          ['Alamat', 'Tanjung Karang Jati Kudus'],
          ['Riwayat', 'MI NU Thalibin, MTs NU TBS Kudus, MA NU WHS, Ponpes Al-Anwar Sarang,Ponpes Sirajul Hanan'],
          ['Hobi', 'BELA DIRI']
        ]
      },
      anam: {
        name: 'Mas Anam',
        details: [
          ['Nama', 'Khoirul Anam'],
          ['Alamat', 'Getassrabi Gebog Kudus'],
          ['Riwayat', 'SD # Getassrabi, MTsN 1 Kudus, MA NU TBS Kudus'],
          ['Hobi', 'Menari']
        ]
      }
    };

    function openModal(type) {
      if (type === 'perkenalan') document.getElementById('modalPerkenalan').classList.add('active');
      else if (type === 'belajar') document.getElementById('modalBelajar').classList.add('active');
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
    }

    function closeOnOutside(e, id) {
      if (e.target === document.getElementById(id)) closeModal(id);
    }

    function showPerson(key) {
      const p = people[key];
      document.getElementById('personName').textContent = p.name;
      let html = '';
      p.details.forEach(([label, value]) => {
        html += `<div class="detail-row"><span class="detail-label">${label}</span><span class="detail-value">${value}</span></div>`;
      });
      document.getElementById('personDetails').innerHTML = html;
      document.getElementById('modalPerson').classList.add('active');
    }

    // Generate particles
    const particleContainer = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.top = Math.random() * 100 + '%';
      p.style.animationDuration = (4 + Math.random() * 6) + 's';
      p.style.animationDelay = (Math.random() * 8) + 's';
      particleContainer.appendChild(p);
    }

    // Element SDK
    const defaultConfig = {
      hero_title: 'MARI BELAJAR BERSAMA',
      hero_subtitle: 'Platform Digital MI NURUL ILMI',
      background_color: '#0a0a0f',
      surface_color: '#111118',
      text_color: '#e0e0e0',
      primary_action_color: '#39ff14',
      secondary_action_color: '#1a8a0a',
      font_family: 'Poppins',
      font_size: 16
    };

    async function onConfigChange(config) {
      const title = config.hero_title || defaultConfig.hero_title;
      const subtitle = config.hero_subtitle || defaultConfig.hero_subtitle;
      const bg = config.background_color || defaultConfig.background_color;
      const surface = config.surface_color || defaultConfig.surface_color;
      const text = config.text_color || defaultConfig.text_color;
      const primary = config.primary_action_color || defaultConfig.primary_action_color;
      const secondary = config.secondary_action_color || defaultConfig.secondary_action_color;
      const font = config.font_family || defaultConfig.font_family;
      const size = config.font_size || defaultConfig.font_size;

      document.getElementById('heroTitle').textContent = title;
      document.getElementById('heroSubtitle').textContent = subtitle;

      document.documentElement.style.setProperty('--bg-dark', bg);
      document.documentElement.style.setProperty('--bg-card', surface);
      document.documentElement.style.setProperty('--text-main', text);
      document.documentElement.style.setProperty('--neon', primary);
      document.documentElement.style.setProperty('--neon-dim', secondary);

      document.body.style.backgroundColor = bg;
      document.body.style.color = text;
      document.body.style.fontFamily = `${font}, Poppins, sans-serif`;
      document.body.style.fontSize = size + 'px';

      document.querySelectorAll('.font-orbitron').forEach(el => {
        el.style.fontFamily = `Orbitron, ${font}, monospace`;
      });

      // Update neon-colored elements
      document.querySelectorAll('.neon-glow, .neon-glow-subtle').forEach(el => {
        el.style.color = primary;
      });
      document.querySelectorAll('.neon-btn').forEach(el => {
        el.style.borderColor = primary;
        el.style.color = primary;
      });
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities: (config) => ({
          recolorables: [
            { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
            { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
            { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
            { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
            { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
          ],
          borderables: [],
          fontEditable: {
            get: () => config.font_family || defaultConfig.font_family,
            set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
          },
          fontSizeable: {
            get: () => config.font_size || defaultConfig.font_size,
            set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
          }
        }),
        mapToEditPanelValues: (config) => new Map([
          ['hero_title', config.hero_title || defaultConfig.hero_title],
          ['hero_subtitle', config.hero_subtitle || defaultConfig.hero_subtitle]
        ])
      });
    }

    // Init Lucide icons
    lucide.createIcons();
  </script>
